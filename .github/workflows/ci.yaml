name: CI

on:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build Toolbox
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Cache cargo artifacts
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build sha1_cracker
        working-directory: sha1_cracker
        run: cargo build

      - name: Build tricoder
        working-directory: tricoder
        run: cargo build

      - name: Build crawler
        working-directory: crawler
        run: cargo build
